<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BOSS 寻源管理系统</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">聘</div>
          <div>
            <p class="eyebrow">BOSS 寻源管理系统</p>
            <h1>招聘运营中台</h1>
          </div>
        </div>
        <div class="sidebar-section">
          <p class="sidebar-label">功能导航</p>
          <nav class="nav">
            <button class="nav-item is-active" data-view="command">
              <span class="nav-item-title">运营总览</span>
              <span class="nav-item-desc">查看核心指标与处理进度</span>
            </button>
            <button class="nav-item" data-view="jobs">
              <span class="nav-item-title">职位管理</span>
              <span class="nav-item-desc">统一管理职位与转化情况</span>
            </button>
            <button class="nav-item" data-view="candidates">
              <span class="nav-item-title">候选人管理</span>
              <span class="nav-item-desc">跟踪候选人阶段与简历状态</span>
            </button>
            <button class="nav-item" data-view="automation">
              <span class="nav-item-title">自动化调度</span>
              <span class="nav-item-desc">查看任务编排与执行情况</span>
            </button>
            <button class="nav-item" data-view="health">
              <span class="nav-item-title">系统状态</span>
              <span class="nav-item-desc">监控服务与运行健康度</span>
            </button>
          </nav>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="page-eyebrow">运营总览</p>
            <h2 id="page-title">今日招聘运营看板</h2>
            <p class="page-description" id="page-description">聚焦核心招聘指标、待办事项与系统运行情况。</p>
          </div>
          <div class="topbar-actions">
            <div class="status-chip">企业运营模式</div>
            <button id="refresh-button">刷新数据</button>
          </div>
        </header>
        <section class="content" id="app"></section>
      </main>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
